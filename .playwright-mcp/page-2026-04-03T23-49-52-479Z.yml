            - text: rises at some orders and falls at others) indicates complex temporal structure — perhaps seasonal cycles in poverty incidence, institutional intervention points that generate new topological features at specific lag distances, or heterogeneous subpopulations with different memory structures that become visible at different temporal scales.
          - heading "From the Ladder to Policy" [level=2] [ref=e878]
          - paragraph [ref=e879]:
            - text: The practical import of a non-trivial ladder is methodological and substantive. Methodologically, it invalidates transition-matrix based poverty trap definitions that implicitly assume Markov dynamics. Substantively, it provides evidence that poverty has a
            - emphasis [ref=e880]: path-dependent
            - text: "structure: where you end up depends not just on where you are but on how long you have been there and what route you took. This finding has direct implications for policy design: interventions targeted at households currently at the poverty threshold will be less effective than the Markov model predicts if prolonged poverty has permanently altered a household’s structural position in the data manifold."
          - heading "A Notional Interactive" [level=2] [ref=e881]
          - paragraph [ref=e882]:
            - text: A future interactive for this module would let you load stylised panel data, adjust the memory order
            - generic [ref=e883]:
              - math [ref=e885]:
                - generic [ref=e888]: m
              - generic [ref=e890]: m
            - text: ", and watch the point cloud grow in dimensionality as"
            - generic [ref=e891]:
              - math [ref=e893]:
                - generic [ref=e896]: m
              - generic [ref=e898]: m
            - text: increases, while a chart below tracks the Wasserstein distance between consecutive diagrams. You would be able to compare a dataset with artificially planted long-run memory (a synthetic poverty trap) to a Markov dataset with the same marginal distributions, and see the ladder clearly distinguish them. This would make concrete the otherwise abstract claim that topology detects memory without specifying its functional form.
          - heading "How This Module Connects" [level=2] [ref=e899]
          - paragraph [ref=e900]:
            - text: The Markov memory ladder is first introduced theoretically in
            - strong [ref=e901]: Chapter 10
            - text: of
            - emphasis [ref=e902]: Counting Lives
            - text: ", which traces the intellectual history of poverty-trap models from Lewis (1954) to Dasgupta–Ray (1986) to contemporary panel-data approaches, and argues that all of them implicitly assume a topology of poverty dynamics that the data may not support."
            - strong [ref=e903]: Chapter 11
            - text: presents early empirical results using the ladder on UK panel data, identifying memory depths of
