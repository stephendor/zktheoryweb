          - heading "Are Yesterday’s Poor Different From Today’s?" [level=2] [ref=e95]
          - paragraph [ref=e96]: "Standard poverty modelling asks: given that a household is poor today, what is the probability it will be poor next year? The answer is estimated from data as a transition probability, and the whole analysis rests on the Markov assumption: what matters is where you are now, not how long you have been there or what path brought you. But experienced poverty researchers are deeply suspicious of this assumption. A household that has been in poverty for five years has different social capital, different physical and mental health, different relationships with institutions, than one newly fallen into poverty this year — even if their observed income and consumption figures are identical today. The Markov assumption, by collapsing all this history into current-state labels, potentially misrepresents the underlying social dynamics. The Markov memory ladder is a topological method for testing whether this suspicion is warranted, without assuming any specific functional form for the memory effect."
