          - heading "Same Income, Different Lives" [level=2] [ref=e103]
          - paragraph [ref=e104]: Consider two households, each reporting annual income of £24,000. The first is a lone adult renting a one-bedroom flat in Leeds. The second is a couple with two school-age children renting a three-bedroom house in the same city. Both households appear identically in any analysis that uses cash income without adjustment. Both occupy the same position on the income distribution. Both are equally far from the 60%-of-median poverty line.
          - paragraph [ref=e105]: Neither observation is useful for understanding either household’s material circumstances. The couple’s £24,000 must cover rent for a larger property, food for four, clothing for growing children, school transport, and childcare. The lone adult’s £24,000 covers none of these additional costs. To compare their living standards, income must be converted to a common denominator that reflects how purchasing power is distributed across different-sized households. This conversion is equivalisation, and the formula used to perform it embeds a complete — if largely unstated — theory of domestic economics.
          - heading "The Equivalisation Formula" [level=2] [ref=e106]
