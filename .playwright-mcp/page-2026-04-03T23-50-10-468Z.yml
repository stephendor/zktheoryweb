                - cell "1.00" [ref=e403]
              - row "Spouse 0.57" [ref=e404]:
                - cell "Spouse" [ref=e405]
                - cell "0.57" [ref=e406]
              - row "Child aged 0–1 0.09" [ref=e407]:
                - cell "Child aged 0–1" [ref=e408]
                - cell "0.09" [ref=e409]
              - row "Child aged 5–7 0.21" [ref=e410]:
                - cell "Child aged 5–7" [ref=e411]
                - cell "0.21" [ref=e412]
              - row "Child aged 13–15 0.36" [ref=e413]:
                - cell "Child aged 13–15" [ref=e414]
                - cell "0.36" [ref=e415]
          - paragraph [ref=e416]:
            - text: "The granularity appeared precise and empirically grounded. In practice, the weights reflected 1970s patterns of household expenditure that aged rapidly: they were based on what households"
            - emphasis [ref=e417]: did
            - text: spend, not what they
            - emphasis [ref=e418]: needed
            - text: to spend, and they were derived from a period before the expansion of formal childcare, before the internet, and before the sharp rise in children’s clothing and activity costs.
          - paragraph [ref=e419]: "The McClements scale’s replacement with the Modified OECD scale in 2005 was a decision made by statisticians in consultation with the DWP, not a parliamentary vote. Yet it reclassified millions of households. The shift illustrates the central point of this module: equivalisation scales are not technical corrections to the data. They are policy decisions that determine who is counted as poor."
          - heading "Economies of Scale and Hidden Assumptions" [level=2] [ref=e420]
          - paragraph [ref=e421]:
            - text: The sub-linear structure of all equivalisation scales — where the equivalence factor grows less than proportionally with household size — reflects the assumption of
            - strong [ref=e422]: economies of scale
            - text: "in household consumption. Larger households share fixed costs: accommodation, heating, appliances, and shared food preparation are assumed to cost less per person in a larger group than in a smaller one."
          - paragraph [ref=e423]: This assumption is empirically contested. Families with young children face significant fixed costs — nappies, pushchairs, car seats, childcare — that do not exhibit economies of scale. Families in poverty have less capacity to realise economies of scale because they lack the capital to buy in bulk or invest in energy-efficient equipment. The sub-linear assumption systematically flatters the equivalised incomes of larger households, most of whom are families, at the expense of measuring their true material circumstances.
          - heading "A Notional Tool for Scale Comparison" [level=2] [ref=e424]
          - paragraph [ref=e425]: "No interactive is embedded in this module. A useful analytic exercise would be a tool that applies the three major scales — original OECD, Modified OECD, and McClements — to the same household income distribution and displays the resulting poverty rates side by side. The visual divergence — particularly for households with children — would make explicit that poverty statistics are not measurements of a fixed quantity but functions of the scale selected. Selecting a different scale is not cheating: it is an acknowledgement that the original selection was itself a choice."
          - heading "How This Module Connects" [level=2] [ref=e426]
          - paragraph [ref=e427]:
            - text: The political history of equivalisation — from McClements through Modified OECD — and its consequences for official poverty statistics are examined in
            - strong [ref=e428]: Chapter 5
            - text: of
            - emphasis [ref=e429]: Counting Lives
            - text: ", which reconstructs the bureaucratic decisions behind each scale revision and shows how they interacted with the political imperatives of successive governments."
            - strong [ref=e430]: Chapter 6
            - text: "analyses the specific consequences of the 2005 switch to the Modified OECD scale, demonstrating that the timing of the revision — mid-way through New Labour’s child poverty reduction programme — was not coincidental: the new scale produced more favourable headline statistics at the cost of understating the deprivation of larger families."
