            - text: ", not 2.7. The same £24,000 household income produces a higher equivalised figure, placing the family further from the poverty threshold. The change in scale moved hundreds of thousands of children out of official poverty in the UK without altering a single household’s actual income — purely by revising the assumed weight of a child from 0.5 to 0.3."
          - heading "The McClements Scale and Political History" [level=2] [ref=e392]
          - paragraph [ref=e393]:
            - text: Before the Modified OECD scale, the UK used the
            - strong [ref=e394]: McClements scale
            - text: ", developed by D.J. McClements for the DHSS in 1977 from UK Family Expenditure Survey data. McClements assigned weights separately for children by age, on the grounds that older children consume more than younger ones:"
          - table [ref=e395]:
            - rowgroup [ref=e396]:
              - row "Household member McClements weight" [ref=e397]:
                - columnheader "Household member" [ref=e398]
                - columnheader "McClements weight" [ref=e399]
            - rowgroup [ref=e400]:
              - row "First adult 1.00" [ref=e401]:
