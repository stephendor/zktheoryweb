          - heading "The Density Confound" [level=2] [ref=e176]
          - paragraph [ref=e177]: "Standard Vietoris–Rips persistence has a well-documented limitation when applied to data with heterogeneous density: it conflates scale effects with density effects. Consider a welfare dataset with two sub-populations — a large dense cluster of working-age households near the poverty line and a small sparse cluster of households with chronic severe deprivation. In a single-parameter VR filtration, the dense cluster generates many short-lived H₀ features at small scales (components quickly merging) and perhaps a persistent loop as the cluster forms a rough ring in variable space. The sparse cluster generates long-lived H₀ features (its components merge only at large scales because the households are far apart) and suppresses any H₁ analysis because sparse regions require large scales before triangulation is possible."
          - paragraph [ref=e178]:
            - text: The scale parameter
            - generic [ref=e179]:
              - math [ref=e181]:
                - generic [ref=e184]: r
              - generic [ref=e186]: r
            - text: "is simultaneously doing two jobs: capturing the geometric scale of features and compensating for the density variation of the point cloud. Increasing"
            - generic [ref=e187]:
              - math [ref=e189]:
                - generic [ref=e192]: r
              - generic [ref=e194]: r
            - text: to reach the sparse cluster simultaneously over-triangulates the dense cluster, destroying topological features in the dense region before the sparse region is even connected. The solution — computing separate VR diagrams for each cluster after density-based stratification — is ad hoc and introduces arbitrary thresholding.
            - strong [ref=e195]: Multi-parameter persistence
            - text: "provides the principled alternative: filter by both"
            - generic [ref=e196]:
              - math [ref=e198]:
                - generic [ref=e201]: r
              - generic [ref=e203]: r
            - text: and a density threshold
            - generic [ref=e204]:
              - math [ref=e206]:
                - generic [ref=e209]: ρ
              - generic [ref=e211]: ρ
            - text: simultaneously, producing a two-dimensional parameter space where scale and density are genuinely independent.
