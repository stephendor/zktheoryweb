            - text: . For a grid of parameter pairs, the rank invariant forms a 4D tensor, but it is typically examined as a family of 2D slices fixing two of the four parameters.
          - paragraph [ref=e781]:
            - strong [ref=e782]: Fibered bar-codes
            - text: decompose the bifiltration into a family of one-parameter restrictions — essentially projecting the 2D parameter space onto one-parameter lines and computing a standard bar-code for each line. The collection of bar-codes across all lines (or a representative sample) characterises the global structure without requiring a single summary.
          - 'heading "RIVET: Interactive Bipersistence Visualisation" [level=2] [ref=e783]'
          - paragraph [ref=e784]:
            - text: The
            - strong [ref=e785]: RIVET
            - text: software (Rivet Interprets Virtually Everything in Topology) is the primary interactive tool for two-parameter persistence analysis. RIVET takes a bifiltration as input and computes the minimal free resolution of the two-parameter module, from which the Hilbert function and rank invariant can be queried for any parameter pair in real time.
          - paragraph [ref=e786]: RIVET’s interface displays the bifiltration’s 2D parameter space with the Hilbert function overlaid as a heatmap, and a “line query” tool that computes the fibered bar-code for any one-parameter line through the space. Moving the line query interactively reveals how the topological summary changes as you sweep through different combinations of scale emphasis and density threshold — the single most powerful diagnostic for understanding whether a topological feature is genuinely independent of density, or merely a density artefact visible at particular scale–density combinations.
          - paragraph [ref=e787]:
            - text: RIVET is available as a standalone executable and as a Python interface via
            - code [ref=e788]: pyrivet
            - text: ". For welfare-data applications, the typical workflow is: compute the bifiltration in Python (using a custom distance-matrix and kernel-density-estimate pipeline), export to RIVET’s input format, and use RIVET’s GUI for interactive exploration before extracting specific numerical invariants for reporting."
          - heading "How This Module Connects" [level=2] [ref=e789]
          - paragraph [ref=e790]:
            - text: Multi-parameter persistence is the methodological innovation at the centre of
            - strong [ref=e791]: Papers 3 and 4
            - text: . Paper 3 develops a bifiltration framework for UKHLS welfare panel data that simultaneously filters by normalised welfare distance and by local density (estimated from the kernel density of the welfare variable distribution), providing the first formal test of whether detected poverty-cycle topology is density-independent. Paper 4 extends this to a three-parameter setting (adding survey wave as a temporal parameter), connecting multi-parameter persistence to the zigzag constructions from Module 7. Together, these two papers represent the frontier of applied two-parameter TDA in social science and constitute the principal technical contribution of the research programme to TDA methodology itself.
