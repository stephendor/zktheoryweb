          - heading "Points Are Not Enough" [level=2] [ref=e127]
          - paragraph [ref=e128]: A crowd of people tells you very little about the society they form. You need to know who knows whom, which groups share resources, which communities overlap, and which are isolated. Points — raw measurements of isolated individuals — carry the same limitation. A point cloud of 5,000 households, each plotted in six-dimensional space, is a set of isolated locations. Without any structure connecting them, you cannot ask whether the households cluster into recognisable groups, whether there are closed loops of mutual dependency, or whether some region of the distribution is topologically void — a gap in the landscape of lived experience. Simplicial complexes are the mathematical machinery that wires points together into higher-dimensional structure, making those questions answerable.
