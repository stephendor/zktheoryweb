            - text: outputs, produces radically different social consequences depending on where the decision threshold is drawn.
          - heading "How This Module Connects" [level=2] [ref=e576]
          - paragraph [ref=e577]:
            - text: The administrative history of predictive scoring in UK welfare — from the DWP’s risk-based compliance tools to local authority safeguarding algorithms — is documented in
            - strong [ref=e578]: Chapter 10
            - text: of
            - emphasis [ref=e579]: Counting Lives
            - text: ", which reconstructs the procurement and deployment history of the systems in use."
            - strong [ref=e580]: Chapter 11
            - text: analyses the legal framework governing automated decision-making under the UK GDPR and the Equality Act, identifying the gap between what the law requires and what procurement practice delivers.
            - strong [ref=e581]: Chapter 12
            - text: examines the empirical accuracy record of deployed welfare prediction models, drawing on Freedom of Information disclosures that post-date their original commissioning.
