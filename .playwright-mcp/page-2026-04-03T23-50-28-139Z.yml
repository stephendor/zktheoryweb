          - heading "A Number Arrives Before the Person" [level=2] [ref=e97]
          - paragraph [ref=e98]: In 2021, the Welsh Government commissioned a predictive analytics tool to identify children at risk of adverse outcomes in early childhood. The system assigned each newborn a score derived from administrative data held by health, social services, and the benefits system. Before a social worker had met a family, before a health visitor had completed an assessment, a number had been generated. That number would shape how services were allocated, how intensively families were visited, and — in some configurations — whether further assessment was triggered automatically.
          - paragraph [ref=e99]: The Welsh system was subsequently paused after concerns about data governance. But the logic it embodied is now pervasive in welfare administration across the United Kingdom. Local authorities use algorithmic scores to prioritise housing waiting lists. DWP uses behavioural predictors to identify claimants at risk of fraud. Predictive policing tools score individuals’ arrest likelihood before any offence has occurred. A score precedes, and increasingly determines, the human encounter.
