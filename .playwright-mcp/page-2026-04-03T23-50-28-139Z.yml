          - paragraph [ref=e417]:
            - text: This is a linear model of the log-odds, which means that the contribution of each feature to the final score is additive and proportional. A claimant’s predicted poverty risk is, literally, a weighted sum of their administrative characteristics — and the weights
            - generic [ref=e418]:
              - math [ref=e420]:
                - generic [ref=e423]: β
              - generic [ref=e427]: β
            - text: are learned from historical data in which the outcomes were shaped by the same institutional choices that are now being modelled as natural facts.
          - heading "The Training Data Problem" [level=2] [ref=e428]
          - paragraph [ref=e429]:
            - text: Logistic regression, and all supervised learning methods, learn from data in which both the features
            - generic [ref=e430]:
              - math [ref=e432]:
                - generic [ref=e435]: x
              - generic [ref=e437]: x
            - text: and the outcomes
            - generic [ref=e438]:
              - math [ref=e440]:
                - generic [ref=e443]: "y"
              - generic [ref=e445]: "y"
            - text: "have been observed. In welfare applications, the outcome variable is typically an administrative classification: previously identified fraud, previous social care intervention, previous long-term unemployment. These classifications are not direct observations of underlying facts — they are the products of prior decisions by investigators, case workers, and adjudicators who were themselves subject to bias, resource constraints, and institutional priorities."
          - paragraph [ref=e446]: A model trained on previous fraud classifications learns the pattern of who was previously investigated and found fraudulent. It does not learn the pattern of who committed fraud. If investigators disproportionately audited claimants in certain postcodes, the model will score claimants in those postcodes more highly — not because they are more likely to be fraudulent, but because they are more likely to have been investigated. The model encodes the investigatory bias as though it were a property of the claimants.
          - paragraph [ref=e447]:
            - text: This feedback loop — sometimes called
            - strong [ref=e448]: label bias
            - text: or
            - strong [ref=e449]: measurement bias
            - text: — is particularly acute in welfare contexts because the populations most intensively surveilled by welfare administration are precisely the marginalised groups whose circumstances are most poorly represented in the training data.
