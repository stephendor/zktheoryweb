              - generic [ref=e506]: τ
            - text: determines the false positive rate (proportion of low-risk claimants wrongly flagged) and the false negative rate (proportion of high-risk claimants wrongly cleared). These two error rates trade off against each other as
            - generic [ref=e507]:
              - math [ref=e509]:
