          - paragraph [ref=e515]:
            - text: In welfare fraud detection, a low
            - generic [ref=e516]:
              - math [ref=e518]:
                - generic [ref=e521]: τ
              - generic [ref=e523]: τ
            - text: minimises missed cases but flags large numbers of legitimate claimants for intrusive investigation. A high
            - generic [ref=e524]:
              - math [ref=e526]:
                - generic [ref=e529]: τ
              - generic [ref=e531]: τ
            - text: "reduces intrusive false positives but misses more genuine cases. The welfare consequences of each error type are asymmetric: false positives impose investigation costs on innocent claimants; false negatives represent financial loss to the DWP. Routinely,"
            - generic [ref=e532]:
              - math [ref=e534]:
