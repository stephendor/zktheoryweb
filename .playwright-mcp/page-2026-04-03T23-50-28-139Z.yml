            - text: is set to minimise the latter at the expense of the former — a policy choice embedded in a technical parameter, largely invisible to public scrutiny.
          - heading "A Notional Tool for Score Anatomy" [level=2] [ref=e540]
          - paragraph [ref=e541]:
            - text: No interactive is embedded in this module. A productive companion exercise would be a tool that presents a simplified logistic regression model trained on synthetic welfare data, allowing users to adjust both the feature set and the decision threshold
            - generic [ref=e542]:
              - math [ref=e544]:
                - generic [ref=e547]: τ
              - generic [ref=e549]: τ
            - text: ", and to observe the resulting false positive and false negative rates across demographic sub-groups. The key observation is that a globally accurate model can simultaneously be a systematically unfair one — and that selecting"
            - generic [ref=e550]:
              - math [ref=e552]:
                - generic [ref=e555]: τ
              - generic [ref=e557]: τ
            - text: is a distributive policy decision, not a statistical one. The tool would make visible that the same model, with the same
            - generic [ref=e558]:
