# ─── Build ────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ─── Dev ──────────────────────────────────────────────────────────────────────

[dev]
  command = "npm run dev"
  port = 4321
  targetPort = 4321

# ─── Security Headers ─────────────────────────────────────────────────────────
# CSP implementation notes (Task 7.4):
#   script-src: 'self' covers dynamically loaded /pagefind/pagefind-ui.js (same-origin).
#     All 12 inline scripts are covered by SHA-256 hashes (build-time deterministic).
#     Both classic and type="module" inline scripts are covered by hashes per CSP Level 3.
#     Astro v5 static output inlines all component scripts — no external /_astro/*.js refs.
#   style-src: 'unsafe-inline' required — rehype-katex emits element-level style="" attributes.
#   font-src: data: required — KaTeX bundles fonts as data: URIs in the compiled CSS.
#   connect-src: 'self' — Pagefind fetch() calls load index chunks from same origin.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-/+xyHT/66E1d619A8TBWsW0/AEwypiwXAuGSgxct44Q=' 'sha256-gMV9/GpJKxhhQJsn4vHeqkPBp3zDyd8BO4L0kAXSXqk=' 'sha256-CS50p46054pMoqXOJNMPkA0WJUae20t93peHPkHlGCM=' 'sha256-FertX8sa3cGIPdhD52i77sOpSIgXww7HfEDqoNm6Dxw=' 'sha256-QzWFZi+FLIx23tnm9SBU4aEgx4x8DsuASP07mfqol/c=' 'sha256-QJZDUlo/qa5AJCrG6vHyWcatjwCeWidEHQfJc601lzw=' 'sha256-Q2BPg90ZMplYY+FSdApNErhpWafg2hcRRbndmvxuL/Q=' 'sha256-z7g91k+vPzsIkT/fRVSF8+Cxnw3hkBG1vHRg75iIxoQ=' 'sha256-eIXWvAmxkr251LJZkjniEK5LcPF3NkapbJepohwYRIc=' 'sha256-mizJIyesxNGRWHF5viQegEyx2wPyG3aw2dKXcpobNpI=' 'sha256-5x7NL7q7lI4TZIeYF0DHZvHvt7qAm6yIc12QFwC/NOs=' 'sha256-0NrmGlZhke9RMjaR1K2jeUrbVRvuMPo5b8HNF0IkhAo='; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

# ─── Static Asset Cache (Astro hashed bundles) ────────────────────────────────

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Font Cache ───────────────────────────────────────────────────────────────

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Pagefind Index Cache ─────────────────────────────────────────────────────
# Shorter TTL — the pagefind index is regenerated with each deploy.

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ─── Redirects ────────────────────────────────────────────────────────────────
# www → apex redirect. HTTP→HTTPS is enforced by Netlify automatically;
# adding an explicit http redirect here would cause redirect loops.

[[redirects]]
  from = "https://www.zktheory.org/*"
  to = "https://zktheory.org/:splat"
  status = 301
  force = true

# ─── Build Hook Note ──────────────────────────────────────────────────────────
# A Zotero build hook can be created in Netlify UI → Site Settings → Build Hooks.
# Once created, call the hook URL from Zotero's server-side processing (e.g., via
# a webhook or scheduled script) to trigger a rebuild whenever the bibliography
# needs to be updated. The hook URL is a POST endpoint — no credentials required.
